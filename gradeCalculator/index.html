<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submission</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <h1 style="text-align: center; margin-top: 50px">
      Input your student's grades, View them in the table below
    </h1>
    <section class="user-input">
      <form id="quizSettings">
        <div class="form-container">
          <div class="form-box">
            <label for="name">Enter a Name:</label>
            <input
              type="text"
              name="name"
              id="name"
              class="form-input"
              autofocus=""
              required=""
            />
          </div>

          <div class="form-box">
            <label>Choose Subject:</label>
            <select name="subjects" id="subjects">
              <option>English</option>
              <option>Maths</option>
              <option>Basic Science</option>
              <option>Arts & Crafts</option>
            </select>
          </div>

          <div class="form-box">
            <label>Score:</label>
            <input
              type="number"
              value=""
              class="form-input"
              id="score"
              name="score"
              required=""
              placeholder="0 - 100"
              max="100"
              min="0"
            />
          </div>
          <div id="form-button">
            <button type="submit">Continue</button>
          </div>
        </div>
      </form>

      <div class="form-container" id="resultTable"></div>
    </section>
    <script type="module" src="input.js"></script>
    <script type="module" src="storage.js"></script>
  </body>
</html>
